name: Build EXE Installer and App-Image

on:
  push:
    tags:
      - 'v*'  # triggers on v1.0, v1.1, v2.0 etc

  workflow_dispatch:
    inputs:
      version:
        description: 'Version number without v prefix (e.g. 0.8.1)'
        required: true
        default: '0.9.'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set version output
        id: version
        shell: pwsh
        run: |
          $v = if ("${{ github.event.inputs.version }}" -ne "") { "${{ github.event.inputs.version }}".TrimStart("v") } else { "${{ github.ref_name }}".TrimStart("v") }
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Set version in pom.xml
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          (Get-Content pom.xml) -replace '<version>.*-SNAPSHOT</version>', "<version>$version</version>" | Set-Content pom.xml
          Write-Host "Updated pom.xml version to $version"

      - name: Build fat JAR
        run: mvn clean package

      - name: Install WiX Toolset (needed for jpackage --type exe)
        run: choco install wixtoolset -y

      - name: Refresh PATH after WiX install
        run: echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Download JavaFX jmods
        shell: pwsh
        run: |
          $url = "https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-jmods.zip"
          Invoke-WebRequest -Uri $url -OutFile "javafx-jmods.zip"
          Expand-Archive -Path "javafx-jmods.zip" -DestinationPath "javafx-jmods"

      - name: Create minimal runtime with jlink
        shell: pwsh
        run: |
          $jmodsPath = (Get-ChildItem -Path "javafx-jmods" -Recurse -Filter "javafx.base.jmod" | Select-Object -First 1).DirectoryName
          Write-Host "jmods path: $jmodsPath"
          Write-Host "JDK jmods: $env:JAVA_HOME\jmods"
          Get-ChildItem -Path "javafx-jmods" -Recurse -Filter "*.jmod" | Select-Object Name
          jlink `
            --no-header-files `
            --no-man-pages `
            --compress=2 `
            --strip-debug `
            --strip-native-commands `
            --module-path "$env:JAVA_HOME\jmods;$jmodsPath" `
            --add-modules java.base,java.desktop,java.logging,java.prefs,java.xml,javafx.controls,javafx.fxml,javafx.graphics `
            --output runtime-minimal

      - name: Strip and consolidate runtime
        shell: pwsh
        run: |
          
          $legalPath = "runtime-minimal\legal"
          $outputFile = "runtime-minimal\LICENSES.txt"

          Get-ChildItem -Path $legalPath -Recurse -File | Sort-Object FullName | ForEach-Object {
           Add-Content -Path $outputFile -Value "=== $($_.FullName.Replace((Resolve-Path $legalPath).Path, '')) ==="
           Add-Content -Path $outputFile -Value (Get-Content $_.FullName -Raw)
           Add-Content -Path $outputFile -Value "`n"
          }
          
          Remove-Item $legalPath -Recurse -Force
          
          Remove-Item "runtime-minimal\conf\security\policy" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "runtime-minimal\conf\security\java.policy" -Force -ErrorAction SilentlyContinue
          
          Remove-Item "runtime-minimal\bin\jrunscript.exe" -Force -ErrorAction SilentlyContinue
          Remove-Item "runtime-minimal\bin\keytool.exe" -Force -ErrorAction SilentlyContinue

      - name: Prepare jpackage input
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "jpackage-input" -Force
          Copy-Item "target/label-printer-1.0-SNAPSHOT.jar" "jpackage-input/"

      - name: Build EXE installer with jpackage
        shell: pwsh
        run: |
          jpackage `
            --input jpackage-input/ `
            --runtime-image runtime-minimal `
            --name "Label Printer" `
            --main-jar "label-printer-1.0-SNAPSHOT.jar" `
            --main-class Launcher `
            --type exe `
            --icon src/main/resources/io/github/carocudo/labelprinter/icon.ico `
            --java-options "-Dfile.encoding=UTF-8" `
            --win-shortcut `
            --win-menu `
            --app-version ${{ steps.version.outputs.version }} `
            --vendor "Carocudo Inc." `
            --description "Label Printer Application" `
            --copyright "Copyright 2026" `
            --dest output/

      - name: Build app-image with jpackage
        shell: pwsh
        run: |
          jpackage `
            --input jpackage-input/ `
            --runtime-image runtime-minimal `
            --name "Label Printer" `
            --main-jar "label-printer-1.0-SNAPSHOT.jar" `
            --main-class Launcher `
            --type app-image `
            --icon src/main/resources/io/github/carocudo/labelprinter/icon.ico `
            --java-options "-Dfile.encoding=UTF-8" `
            --app-version ${{ steps.version.outputs.version }} `
            --vendor "Carocudo Inc." `
            --description "Label Printer Application" `
            --dest output/

      - name: Zip app-image
        shell: pwsh
        run: |
          $appImageDir = Join-Path "output" "Label Printer"
          if (!(Test-Path $appImageDir)) {
            Write-Error "App-image directory not found at $appImageDir"
          }
          $zipPath = Join-Path "output" "Label-Printer-app-image-${{ steps.version.outputs.version }}.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$appImageDir\*" -DestinationPath $zipPath

      - name: Create tag for manual trigger
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release (tag push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: Label Printer ${{ github.ref_name }}
          body: |
            ## Label Printer ${{ github.ref_name }}

            ### Installation (Windows EXE)
            1. Download `Label-Printer-*.exe` below
            2. Run the installer
            3. Launch from Start Menu or Desktop shortcut

            ### Portable App (App-Image)
            1. Download `Label-Printer-app-image-*.zip` below
            2. Unzip
            3. Run the launcher inside the unzipped folder
          files: |
            output/*.exe
            output/Label-Printer-app-image-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Label Printer v${{ steps.version.outputs.version }}
          body: |
            ## Label Printer v${{ steps.version.outputs.version }}

            ### Installation (Windows EXE)
            1. Download `Label-Printer-*.exe` below
            2. Run the installer
            3. Launch from Start Menu or Desktop shortcut

            ### Portable App (App-Image)
            1. Download `Label-Printer-app-image-*.zip` below
            2. Unzip
            3. Run the launcher inside the unzipped folder
          files: |
            output/*.exe
            output/Label-Printer-app-image-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
